version: '3.8'

services:
  ai-crawler:
    build: .
    image: ai-smart-crawler:latest
    container_name: ai-crawler
    volumes:
      - ./output:/app/output
      - ./examples:/app/examples
    environment:
      - PYTHONUNBUFFERED=1
    command: python quickstart.py
    
  # CLI服务模式
  ai-crawler-cli:
    build: .
    image: ai-smart-crawler:latest
    container_name: ai-crawler-cli
    volumes:
      - ./output:/app/output
      - ./examples:/app/examples
    entrypoint: ["ai-crawler"]
    command: ["--help"]
